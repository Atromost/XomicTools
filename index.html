<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tantrix · premium suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="icon.png" sizes="48x48">
<style>
:root {
  --ink: #0d0d0d;
  --ink2: #2a2a2a;
  --ink3: #4a4a4a;
  --ink4: #7a7a7a;
  --paper: #f2f0eb;
  --paper2: #e8e5de;
  --paper3: #d8d5ce;
  --accent: #0d0d0d;
  --border: rgba(0,0,0,0.12);
  --shadow: 2px 2px 0 rgba(0,0,0,0.15);
  color-scheme: light dark;
}
[data-theme="dark"] {
  --ink: #f0ede6;
  --ink2: #d0cdc6;
  --ink3: #a0a09a;
  --ink4: #666662;
  --paper: #0f0f0e;
  --paper2: #1a1a18;
  --paper3: #242422;
  --border: rgba(255,255,255,0.1);
  --shadow: 2px 2px 0 rgba(255,255,255,0.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  user-select: none;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
@media (pointer: fine) { html, body { cursor: none; } }

/* CURSOR — desktop only */
#cur-dot, #cur-ring {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  top: 0; left: 0;
  will-change: transform;
}
#cur-dot {
  width: 5px; height: 5px;
  background: var(--ink);
  transition: transform .08s, opacity .2s;
}
#cur-ring {
  width: 28px; height: 28px;
  border: 1.5px solid var(--ink3);
  transition: width .22s cubic-bezier(.23,1,.32,1), height .22s cubic-bezier(.23,1,.32,1), border-color .22s, opacity .2s;
}
@media (pointer: coarse) { #cur-dot, #cur-ring { display: none; } }
body.hovering #cur-ring { width: 44px; height: 44px; border-color: var(--ink); }
body.clicking #cur-dot { transform: translate(-50%,-50%) scale(2); background: var(--ink2); }

/* TOPBAR */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  animation: slideDown .5s cubic-bezier(.23,1,.32,1) backwards;
}
@keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.topbar-logo {
  font-family: 'Space Mono', monospace;
  font-size: .72rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--ink); display: flex; align-items: center; gap: 10px;
}
/* REPLACED: logo-mark now shows icon.png */
.logo-mark {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-mark img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
.topbar-status {
  font-family: 'Space Mono', monospace;
  font-size: .65rem; letter-spacing: 2px; color: var(--ink4); text-transform: uppercase;
}
@media (max-width: 400px) { .topbar-status { display: none; } }
.topbar-right { display: flex; align-items: center; gap: 12px; }
#clock {
  font-family: 'Space Mono', monospace;
  font-size: .72rem; color: var(--ink3); letter-spacing: 2px;
}
#themeBtn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--paper2);
  color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: background .2s, border-color .2s;
  box-shadow: var(--shadow);
  -webkit-tap-highlight-color: transparent;
}
#themeBtn:hover { background: var(--paper3); }

/* GITHUB BUTTON */
.git-btn {
  position: fixed; top: 58px; right: 20px; z-index: 201;
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  font-family: 'Space Mono', monospace;
  font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase;
  text-decoration: none; color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: var(--shadow);
  transition: transform .12s, box-shadow .12s;
  animation: fadeInRight .6s .2s cubic-bezier(.23,1,.32,1) backwards;
  -webkit-tap-highlight-color: transparent;
}
@media (max-width: 480px) { .git-btn { display: none; } }
@keyframes fadeInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.git-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink3); }
.git-btn:active { transform: translate(1px,1px); box-shadow: 0 0 0 transparent; }
.git-btn svg { width: 14px; height: 14px; flex-shrink: 0; stroke: var(--ink); }

/* MAIN */
#stage {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  padding: 72px 16px 40px;
  gap: 1.5rem;
}

/* WORDMARK */
.wordmark { text-align: center; animation: wordmarkIn .7s cubic-bezier(.23,1,.32,1) .1s backwards; }
@keyframes wordmarkIn { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
.wordmark h1 {
  font-size: clamp(1.4rem, 3.5vw, 2.2rem);
  font-weight: 700; letter-spacing: 8px; text-transform: uppercase; color: var(--ink);
}
.wordmark h1 span { opacity: 0.35; }
.wordmark p {
  font-family: 'Space Mono', monospace;
  font-size: .62rem; letter-spacing: 4px; color: var(--ink4);
  margin-top: 8px; text-transform: uppercase;
}
.wordmark-line {
  width: 40px; height: 1.5px; background: var(--ink); margin: 12px auto 0; opacity: 0.2;
}

/* APP GRID — 14 apps now (with PuzzleSnap) */
.app-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(100px, 148px));
  gap: 10px;
  width: 100%;
  max-width: 520px;
  justify-content: center;
  animation: gridIn .6s cubic-bezier(.23,1,.32,1) .2s backwards;
}
@keyframes gridIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 400px) {
  .app-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
}

.app-card {
  position: relative;
  padding: 16px 8px 12px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .25s cubic-bezier(.23,1,.32,1), box-shadow .25s, background .2s;
  animation: cardPop .5s cubic-bezier(.23,1,.32,1) backwards;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
@keyframes cardPop { from { opacity: 0; transform: translateY(12px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.app-card:hover {
  transform: translate(-2px,-3px);
  box-shadow: 4px 5px 0 var(--ink3);
  background: var(--paper2);
}
.app-card:active {
  transform: translate(1px,1px);
  box-shadow: 1px 1px 0 var(--ink4);
  background: var(--paper2);
}
.app-card-tag {
  position: absolute; top: 10px; right: 10px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ink); opacity: 0.15;
}
.app-card:hover .app-card-tag { opacity: 0.6; }
.app-icon {
  width: 36px; height: 36px; color: var(--ink); display: flex; align-items: center; justify-content: center;
  transition: transform .25s cubic-bezier(.23,1,.32,1);
}
.app-icon svg { width: 100%; height: 100%; stroke-width: 1.5; overflow: visible; }
.app-card:hover .app-icon { transform: scale(1.1) translateY(-2px); }
.app-label {
  font-size: .7rem; font-weight: 600; letter-spacing: .3px; color: var(--ink2);
  transition: color .2s; text-align: center; line-height: 1.2;
  word-break: break-word;
}
.app-card:hover .app-label { color: var(--ink); }

/* RIPPLE */
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(0,0,0,0.06);
  transform: scale(0);
  animation: rippleAnim .5s ease-out forwards;
  pointer-events: none; z-index: 5;
}
[data-theme="dark"] .ripple { background: rgba(255,255,255,0.06); }
@keyframes rippleAnim { to { transform: scale(5); opacity: 0; } }

/* LOADER */
#loader {
  position: fixed; inset: 0;
  background: var(--paper);
  z-index: 9998;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  pointer-events: none; opacity: 0;
  transition: opacity .25s ease;
}
#loader.show { opacity: 1; pointer-events: auto; }
.loader-icon { width: 56px; height: 56px; color: var(--ink); animation: loaderFloat 2s ease-in-out infinite; }
.loader-icon svg { width: 100%; height: 100%; stroke-width: 1.4; }
@keyframes loaderFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.loader-name {
  font-family: 'Space Mono', monospace;
  font-size: .75rem; letter-spacing: 3px; text-transform: uppercase; color: var(--ink3);
}
.loader-bar-bg { width: 180px; height: 2px; background: var(--paper3); border-radius: 2px; overflow: hidden; }
.loader-bar-fill { height: 100%; width: 0%; background: var(--ink); border-radius: 2px; transition: width .75s cubic-bezier(.65,0,.35,1); }

/* STAGGER — 14 items */
.stagger-1  { animation-delay: .04s !important; }
.stagger-2  { animation-delay: .08s !important; }
.stagger-3  { animation-delay: .12s !important; }
.stagger-4  { animation-delay: .16s !important; }
.stagger-5  { animation-delay: .20s !important; }
.stagger-6  { animation-delay: .24s !important; }
.stagger-7  { animation-delay: .28s !important; }
.stagger-8  { animation-delay: .32s !important; }
.stagger-9  { animation-delay: .36s !important; }
.stagger-10 { animation-delay: .40s !important; }
.stagger-11 { animation-delay: .44s !important; }
.stagger-12 { animation-delay: .48s !important; }
.stagger-13 { animation-delay: .52s !important; }
.stagger-14 { animation-delay: .56s !important; }
</style>
</head>

      <circle cx="20" cy="10" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="14" cy="20" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="4" cy="14" r="1.5" fill="currentColor" stroke="none"/>
      <!-- Snap/flash effect -->
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v1M12 15v1M8 12h1M15 12h1" stroke-width="1"/>
    </svg>` }
];

const grid = document.getElementById('appGrid');

APPS.forEach((app, i) => {
  const card = document.createElement('div');
  card.className = `app-card hover-target stagger-${i+1}`;
  card.innerHTML = `<div class="app-card-tag"></div><div class="app-icon">${app.icon}</div><span class="app-label">${app.name}</span>`;
  card.addEventListener('click', e => { ripple(card, e); launch(app); });
  grid.appendChild(card);
});

/* LAUNCHER */
const loader    = document.getElementById('loader');
const loaderIcon = document.getElementById('loaderIcon');
const loaderName = document.getElementById('loaderName');
const loaderBar  = document.getElementById('loaderBar');
const statusTxt  = document.getElementById('statusText');

function launch(app) {
  loaderIcon.innerHTML = app.icon;
  loaderName.textContent = `Starting ${app.name}…`;
  loaderBar.style.width = '0%';
  loader.classList.add('show');
  statusTxt.textContent = `Loading ${app.name}`;
  setTimeout(() => { loaderBar.style.width = '100%'; }, 60);
  setTimeout(() => { window.location.href = app.url; }, 950);
}

/* RIPPLE */
function ripple(el, e) {
  const r = el.getBoundingClientRect();
  const rip = document.createElement('div');
  rip.className = 'ripple';
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  rip.style.cssText = `left:${x}px;top:${y}px;width:${r.width}px;height:${r.width}px;margin-left:-${r.width/2}px;margin-top:-${r.width/2}px;`;
  el.appendChild(rip);
  rip.addEventListener('animationend', () => rip.remove());
}

/* CLOCK */
const clockEl = document.getElementById('clock');
function updateClock() {
  const now = new Date();
  clockEl.textContent = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
}
updateClock(); setInterval(updateClock, 1000);

/* THEME */
const themeBtn = document.getElementById('themeBtn');
let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeBtn.textContent = dark ? '☀' : '☾';
}
applyTheme();
themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });

/* CURSOR — desktop only */
(function() {
  if (window.matchMedia('(pointer: coarse)').matches) return;
  const dot = document.getElementById('cur-dot');
  const ring = document.getElementById('cur-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;
  window.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.transform = `translate(calc(${mx}px - 50%), calc(${my}px - 50%))`;
  });
  document.querySelectorAll('.hover-target').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });
  window.addEventListener('mousedown', () => document.body.classList.add('clicking'));
  window.addEventListener('mouseup', () => document.body.classList.remove('clicking'));
  (function frame() {
    rx += (mx - rx) * .13; ry += (my - ry) * .13;
    ring.style.transform = `translate(calc(${rx}px - 50%), calc(${ry}px - 50%))`;
    requestAnimationFrame(frame);
  })();
  document.addEventListener('mouseleave', () => { dot.style.opacity='0'; ring.style.opacity='0'; });
  document.addEventListener('mouseenter', () => { dot.style.opacity='1'; ring.style.opacity='1'; });
})();
</script>
</body>
