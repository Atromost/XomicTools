<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --flowly-accent: #c8f135;
    --flowly-bg: #0a0a0a;
    --drawki-accent: #7c6ff7;
    --drawki-bg: #12111e;
    --drawki-pink: #e8547a;
    --drawki-yellow: #f0c040;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #080808;
    position: relative;
    cursor: none;
    position: relative;
  }

  /* CUSTOM CURSOR */
  .cursor {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: white;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    transition: transform 0.15s ease;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    pointer-events: none;
    z-index: 9998;
    transition: all 0.25s ease;
  }

  /* BACKGROUND SPLIT */
  .bg-left {
    position: fixed;
    left: 0; top: 0;
    width: 50%; height: 100%;
    background: var(--flowly-bg);
    z-index: 0;
  }
  .bg-right {
    position: fixed;
    right: 0; top: 0;
    width: 50%; height: 100%;
    background: var(--drawki-bg);
    z-index: 0;
  }

  /* GRID OVERLAYS */
  .grid-left {
    position: fixed;
    left: 0; top: 0;
    width: 50%; height: 100%;
    background-image:
      linear-gradient(rgba(200,241,53,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,241,53,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
  }
  .grid-right {
    position: fixed;
    right: 0; top: 0;
    width: 50%; height: 100%;
    background-image:
      radial-gradient(rgba(124,111,247,0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    z-index: 1;
  }

  /* FLOATING PARTICLES */
  .particles-left { position: fixed; left: 0; top: 0; width: 50%; height: 100%; z-index: 2; pointer-events: none; overflow: hidden; }
  .particles-right { position: fixed; right: 0; top: 0; width: 50%; height: 100%; z-index: 2; pointer-events: none; overflow: hidden; }

  .p-dot {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  .p-dot.green { background: var(--flowly-accent); box-shadow: 0 0 8px var(--flowly-accent); }
  .p-dot.purple { background: var(--drawki-accent); box-shadow: 0 0 8px var(--drawki-accent); }
  .p-dot.pink { background: var(--drawki-pink); box-shadow: 0 0 8px var(--drawki-pink); }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
  }

  /* NOISE TEXTURE */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.4;
  }

  /* DIVIDER LINE */
  .divider {
    position: fixed;
    left: 50%;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0.15) 80%, transparent);
    z-index: 5;
    transform: translateX(-0.5px);
  }
  .divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 16px rgba(255,255,255,0.8);
  }

  /* MAIN CONTENT */
  .wrapper {
    position: relative;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .headline {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(11px, 1.4vw, 13px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(12px, 1.3vw, 14px);
    color: rgba(255,255,255,0.2);
    text-align: center;
    letter-spacing: 0.05em;
    margin-top: -8px;
    margin-bottom: 16px;
  }

  .buttons-row {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  /* ---- FLOWLY BUTTON ---- */
  .btn-flowly {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 32px;
    background: transparent;
    border: 1.5px solid var(--flowly-accent);
    color: var(--flowly-accent);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.02em;
    overflow: hidden;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    transition: color 0.3s ease;
  }
  .btn-flowly::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--flowly-accent);
    transform: translateX(-110%);
    transition: transform 0.4s cubic-bezier(0.77, 0, 0.18, 1);
    z-index: -1;
  }
  .btn-flowly:hover::before { transform: translateX(0); }
  .btn-flowly:hover { color: #0a0a0a; }

  /* glow ring */
  .btn-flowly::after {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid rgba(200,241,53,0.2);
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-flowly:hover::after { opacity: 1; }

  /* scan-line animation on hover */
  .btn-flowly .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: rgba(200,241,53,0.6);
    top: -2px;
    animation: none;
  }
  .btn-flowly:hover .scanline {
    animation: scanDown 0.5s linear forwards;
  }
  @keyframes scanDown {
    0% { top: -2px; opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .btn-flowly .icon { flex-shrink: 0; transition: transform 0.3s; }
  .btn-flowly:hover .icon { transform: scale(1.15) rotate(5deg); }

  .node-tag {
    position: absolute;
    top: -9px; right: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--flowly-accent);
    background: var(--flowly-bg);
    padding: 1px 5px;
    border: 1px solid var(--flowly-accent);
    letter-spacing: 0.1em;
    transition: background 0.3s, color 0.3s;
  }
  .btn-flowly:hover .node-tag {
    background: var(--flowly-accent);
    color: var(--flowly-bg);
  }

  /* ---- OR ---- */
  .or-sep {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.2em;
    position: relative;
  }
  .or-sep::before, .or-sep::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 20px; height: 1px;
    background: rgba(255,255,255,0.12);
  }
  .or-sep::before { right: calc(100% + 8px); }
  .or-sep::after { left: calc(100% + 8px); }

  /* ---- DRAWKI BUTTON ---- */
  .btn-drawki {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 32px;
    background: transparent;
    border: 1.5px solid var(--drawki-accent);
    color: #e2e0ff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.02em;
    border-radius: 8px;
    overflow: hidden;
    transition: color 0.3s ease, border-color 0.3s;
  }
  .btn-drawki::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--drawki-accent), var(--drawki-pink));
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
  }
  .btn-drawki:hover::before { opacity: 1; }
  .btn-drawki:hover { color: white; border-color: transparent; }

  /* bubble pop */
  .btn-drawki .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transform: scale(0);
    pointer-events: none;
    animation: bubblePop 0.6s ease-out forwards;
  }
  @keyframes bubblePop {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(4); opacity: 0; }
  }

  .btn-drawki .icon { flex-shrink: 0; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .btn-drawki:hover .icon { transform: rotate(15deg) scale(1.2); }

  /* floating shapes around drawki btn */
  .drawki-shapes {
    position: absolute;
    inset: -40px;
    pointer-events: none;
    z-index: -1;
  }
  .d-shape {
    position: absolute;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-drawki:hover ~ .drawki-shapes .d-shape,
  .btn-drawki-wrap:hover .d-shape { opacity: 1; }

  /* badges */
  .badge {
    position: absolute;
    top: -10px; left: 14px;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .badge.yellow { background: var(--drawki-yellow); color: #1a1200; }
  .badge.pink { background: var(--drawki-pink); color: white; left: auto; right: -4px; top: -8px; width: 14px; height: 14px; font-size: 7px; }
  .btn-drawki:hover .badge { transform: scale(1.3) rotate(-10deg); }

  /* ---- BOTTOM TAG ---- */
  .bottom-tag {
    margin-top: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.12);
    text-align: center;
  }

  /* ---- ANIMATED CORNER MARKS ---- */
  .corner {
    position: fixed;
    z-index: 20;
    width: 32px; height: 32px;
  }
  .corner svg line { stroke: rgba(255,255,255,0.15); stroke-width: 1; }
  .corner-tl { top: 20px; left: 20px; }
  .corner-tr { top: 20px; right: 20px; transform: rotate(90deg); }
  .corner-bl { bottom: 20px; left: 20px; transform: rotate(-90deg); }
  .corner-br { bottom: 20px; right: 20px; transform: rotate(180deg); }

  /* ---- SIDE LABELS ---- */
  .side-label {
    position: fixed;
    z-index: 20;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    opacity: 0.25;
  }
  .side-label.left {
    left: 24px;
    top: 50%;
    transform: translateY(-50%) rotate(180deg);
    color: var(--flowly-accent);
  }
  .side-label.right {
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--drawki-accent);
  }

  /* ANIMATED SVG NODES (left bg) */
  .nodes-svg {
    position: fixed;
    left: 0; top: 0;
    width: 50%; height: 100%;
    z-index: 3;
    pointer-events: none;
    opacity: 0.25;
  }
  .node-circle { fill: none; stroke: var(--flowly-accent); stroke-width: 1; }
  .node-dot { fill: var(--flowly-accent); }
  .node-line { stroke: var(--flowly-accent); stroke-width: 0.8; stroke-dasharray: 4 6; animation: dashMove 3s linear infinite; }
  @keyframes dashMove { to { stroke-dashoffset: -30; } }

  /* FLOATING SHAPES (right bg) */
  .shapes-svg {
    position: fixed;
    right: 0; top: 0;
    width: 50%; height: 100%;
    z-index: 3;
    pointer-events: none;
    opacity: 0.18;
  }

  /* pulse ring on node circles */
  .pulse-ring {
    fill: none;
    stroke: var(--flowly-accent);
    stroke-width: 0.5;
    animation: pulseOut 2s ease-out infinite;
    transform-origin: center;
  }
  @keyframes pulseOut {
    0% { r: 10; opacity: 0.8; }
    100% { r: 30; opacity: 0; }
  }

  /* rotating shapes */
  .rot-shape { animation: rotateSlow linear infinite; transform-origin: center; }
  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* GITHUB BUTTON */
  .github-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 8px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    animation: enterDown 0.6s 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  .github-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.35);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .github-btn svg { flex-shrink: 0; transition: transform 0.3s; }
  .github-btn:hover svg:first-child { transform: rotate(15deg) scale(1.1); }
  .gh-stars {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--flowly-accent);
    background: rgba(200,241,53,0.08);
    border: 1px solid rgba(200,241,53,0.25);
    border-radius: 999px;
    padding: 2px 7px;
    margin-left: 2px;
    transition: background 0.3s, border-color 0.3s;
  }
  .github-btn:hover .gh-stars {
    background: rgba(200,241,53,0.15);
    border-color: rgba(200,241,53,0.5);
  }

  /* enter animation */
  .wrapper { animation: enterDown 0.8s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes enterDown {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TITLE WORD split */
  .title-block {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .title-word {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 4vw, 48px);
    line-height: 1;
    animation: wordReveal 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  .title-word:nth-child(1) { color: var(--flowly-accent); animation-delay: 0.1s; }
  .title-word:nth-child(2) { color: rgba(255,255,255,0.15); font-size: clamp(18px,2.5vw,28px); }
  .title-word:nth-child(3) { color: var(--drawki-accent); animation-delay: 0.25s; }
  @keyframes wordReveal {
    from { opacity: 0; transform: translateY(20px) skewX(-6deg); }
    to { opacity: 1; transform: translateY(0) skewX(0); }
  }

  /* btn wrapper for shape positioning */
  .btn-drawki-wrap {
    position: relative;
  }
</style>
</head>
<body>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- BACKGROUNDS -->
<div class="bg-left"></div>
<div class="bg-right"></div>
<div class="grid-left"></div>
<div class="grid-right"></div>

<!-- PARTICLES -->
<div class="particles-left" id="partsLeft"></div>
<div class="particles-right" id="partsRight"></div>

<!-- NODE GRAPH SVG (left) -->
<svg class="nodes-svg" viewBox="0 0 683 768" preserveAspectRatio="xMidYMid slice">
  <!-- connections -->
  <line class="node-line" x1="100" y1="120" x2="280" y2="220"/>
  <line class="node-line" x1="280" y1="220" x2="420" y2="160" style="animation-delay:-1s"/>
  <line class="node-line" x1="60" y1="380" x2="280" y2="220" style="animation-delay:-2s"/>
  <line class="node-line" x1="280" y1="220" x2="350" y2="400" style="animation-delay:-0.5s"/>
  <line class="node-line" x1="350" y1="400" x2="160" y2="520" style="animation-delay:-1.5s"/>
  <line class="node-line" x1="350" y1="400" x2="500" y2="480" style="animation-delay:-2.5s"/>
  <line class="node-line" x1="160" y1="520" x2="80" y2="650" style="animation-delay:-0.8s"/>
  <line class="node-line" x1="500" y1="480" x2="600" y2="620" style="animation-delay:-1.8s"/>
  <!-- nodes -->
  <g>
    <circle class="node-circle" cx="100" cy="120" r="10"/>
    <circle class="pulse-ring" cx="100" cy="120" r="10" style="animation-delay:0s"/>
    <circle class="node-dot" cx="100" cy="120" r="4"/>
  </g>
  <g>
    <circle class="node-circle" cx="280" cy="220" r="14"/>
    <circle class="pulse-ring" cx="280" cy="220" r="14" style="animation-delay:0.6s"/>
    <circle class="node-dot" cx="280" cy="220" r="5"/>
  </g>
  <g>
    <circle class="node-circle" cx="420" cy="160" r="8"/>
    <circle class="node-dot" cx="420" cy="160" r="3"/>
  </g>
  <g>
    <circle class="node-circle" cx="60" cy="380" r="10"/>
    <circle class="node-dot" cx="60" cy="380" r="4"/>
    <circle class="pulse-ring" cx="60" cy="380" r="10" style="animation-delay:1.2s"/>
  </g>
  <g>
    <circle class="node-circle" cx="350" cy="400" r="16"/>
    <circle class="pulse-ring" cx="350" cy="400" r="16" style="animation-delay:0.3s"/>
    <circle class="node-dot" cx="350" cy="400" r="6"/>
  </g>
  <g>
    <circle class="node-circle" cx="160" cy="520" r="10"/>
    <circle class="node-dot" cx="160" cy="520" r="4"/>
  </g>
  <g>
    <circle class="node-circle" cx="500" cy="480" r="12"/>
    <circle class="pulse-ring" cx="500" cy="480" r="12" style="animation-delay:0.9s"/>
    <circle class="node-dot" cx="500" cy="480" r="5"/>
  </g>
  <g>
    <circle class="node-circle" cx="80" cy="650" r="8"/>
    <circle class="node-dot" cx="80" cy="650" r="3"/>
  </g>
  <g>
    <circle class="node-circle" cx="600" cy="620" r="10"/>
    <circle class="node-dot" cx="600" cy="620" r="4"/>
  </g>
</svg>

<!-- FLOATING SHAPES SVG (right) -->
<svg class="shapes-svg" viewBox="0 0 683 768" preserveAspectRatio="xMidYMid slice">
  <!-- sticky note outline -->
  <rect x="80" y="80" width="90" height="90" rx="3" fill="none" stroke="#f0c040" stroke-width="1.2"
    style="animation: rotateSlow 40s linear infinite; transform-origin: 125px 125px;"/>
  <!-- ellipse -->
  <ellipse cx="540" cy="160" rx="60" ry="45" fill="none" stroke="#e8547a" stroke-width="1.2"
    style="animation: rotateSlow 25s linear infinite reverse; transform-origin: 540px 160px;"/>
  <!-- triangle -->
  <polygon points="140,500 200,400 260,500" fill="none" stroke="#7c6ff7" stroke-width="1"
    style="animation: rotateSlow 35s linear infinite; transform-origin: 200px 467px;"/>
  <!-- diamond -->
  <polygon points="480,520 530,460 580,520 530,580" fill="none" stroke="#f0c040" stroke-width="1"
    style="animation: rotateSlow 30s linear infinite reverse; transform-origin: 530px 520px;"/>
  <!-- small rect -->
  <rect x="300" y="620" width="50" height="50" rx="2" fill="none" stroke="#e8547a" stroke-width="0.8"
    style="animation: rotateSlow 20s linear infinite; transform-origin: 325px 645px;"/>
  <!-- dots grid -->
  <g fill="#7c6ff7" opacity="0.6">
    <circle cx="400" cy="320" r="2.5"/>
    <circle cx="430" cy="320" r="2.5"/>
    <circle cx="460" cy="320" r="2.5"/>
    <circle cx="400" cy="350" r="2.5"/>
    <circle cx="430" cy="350" r="2.5"/>
    <circle cx="460" cy="350" r="2.5"/>
  </g>
  <!-- star -->
  <polygon points="200,200 210,180 220,200 240,205 225,220 230,240 210,230 190,240 195,220 180,205"
    fill="none" stroke="#f0c040" stroke-width="0.8"
    style="animation: rotateSlow 18s linear infinite; transform-origin: 210px 210px;"/>
</svg>

<!-- DIVIDER -->
<div class="divider"></div>

<!-- CORNERS -->

<script>
// CURSOR
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = -100, my = -100, rx = -100, ry = -100;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function animCursor() {
  cursor.style.left = mx - 6 + 'px';
  cursor.style.top = my - 6 + 'px';
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx - 18 + 'px';
  ring.style.top = ry - 18 + 'px';
  requestAnimationFrame(animCursor);
})();

// PARTICLES
function makeDots(container, colorClass, count) {
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = `p-dot ${colorClass}`;
    const size = Math.random() * 3 + 1.5;
    d.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:${Math.random()*20-10}%;
      animation-duration:${6 + Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    container.appendChild(d);
  }
}
makeDots(document.getElementById('partsLeft'), 'green', 18);
makeDots(document.getElementById('partsRight'), 'purple', 10);
makeDots(document.getElementById('partsRight'), 'pink', 8);

// DRAWKI BUTTON bubble on hover
document.getElementById('drawkiBtn').addEventListener('mouseenter', function(e) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const r = this.getBoundingClientRect();
  const size = 60;
  b.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
  this.appendChild(b);
  setTimeout(() => b.remove(), 700);
});
</script>
