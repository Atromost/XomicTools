<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="/icon.png" sizes="32x32">
<style>
:root {
  --ink: #0d0d0d;
  --ink2: #2a2a2a;
  --ink3: #4a4a4a;
  --ink4: #7a7a7a;
  --paper: #f2f0eb;
  --paper2: #e8e5de;
  --paper3: #d8d5ce;
  --accent: #0d0d0d;
  --border: rgba(0,0,0,0.12);
  --shadow: 2px 2px 0 rgba(0,0,0,0.15);
  color-scheme: light dark;
}
[data-theme="dark"] {
  --ink: #f0ede6;
  --ink2: #d0cdc6;
  --ink3: #a0a09a;
  --ink4: #666662;
  --paper: #0f0f0e;
  --paper2: #1a1a18;
  --paper3: #242422;
  --border: rgba(255,255,255,0.1);
  --shadow: 2px 2px 0 rgba(255,255,255,0.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  cursor: none;
  user-select: none;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* CURSOR */
#cur-dot, #cur-ring {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  top: 0; left: 0;
  will-change: transform;
}
#cur-dot {
  width: 5px; height: 5px;
  background: var(--ink);
  transition: transform .08s, opacity .2s;
}
#cur-ring {
  width: 28px; height: 28px;
  border: 1.5px solid var(--ink3);
  transition: width .22s cubic-bezier(.23,1,.32,1), height .22s cubic-bezier(.23,1,.32,1), border-color .22s, opacity .2s;
}
body.hovering #cur-ring { width: 44px; height: 44px; border-color: var(--ink); }
body.clicking #cur-dot { transform: translate(-50%,-50%) scale(2); background: var(--ink2); }

/* TOPBAR */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  animation: slideDown .5s cubic-bezier(.23,1,.32,1) backwards;
}
@keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.topbar-logo {
  font-family: 'Space Mono', monospace;
  font-size: .72rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--ink); display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 20px; height: 20px;
  border: 1.5px solid var(--ink);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.logo-mark-inner { width: 8px; height: 8px; background: var(--ink); border-radius: 2px; }
.topbar-status {
  font-family: 'Space Mono', monospace;
  font-size: .65rem; letter-spacing: 2px; color: var(--ink4); text-transform: uppercase;
}
.topbar-right { display: flex; align-items: center; gap: 16px; }
#clock {
  font-family: 'Space Mono', monospace;
  font-size: .72rem; color: var(--ink3); letter-spacing: 2px;
}
#themeBtn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--paper2);
  color: var(--ink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: background .2s, border-color .2s;
  box-shadow: var(--shadow);
}
#themeBtn:hover { background: var(--paper3); }

/* GITHUB BUTTON */
.git-btn {
  position: fixed; top: 58px; right: 20px; z-index: 201;
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  font-family: 'Space Mono', monospace;
  font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase;
  text-decoration: none; color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: var(--shadow);
  transition: transform .12s, box-shadow .12s;
  animation: fadeInRight .6s .2s cubic-bezier(.23,1,.32,1) backwards;
}
@keyframes fadeInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.git-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink3); }
.git-btn:active { transform: translate(1px,1px); box-shadow: 0 0 0 transparent; }
.git-btn svg { width: 14px; height: 14px; flex-shrink: 0; stroke: var(--ink); }

/* MAIN */
#stage {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  padding: 90px 24px 110px;
  gap: 2.5rem;
}

/* WORDMARK */
.wordmark { text-align: center; animation: wordmarkIn .7s cubic-bezier(.23,1,.32,1) .1s backwards; }
@keyframes wordmarkIn { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
.wordmark h1 {
  font-size: clamp(1.8rem, 4.5vw, 3rem);
  font-weight: 700; letter-spacing: 8px; text-transform: uppercase; color: var(--ink);
}
.wordmark h1 span { opacity: 0.35; }
.wordmark p {
  font-family: 'Space Mono', monospace;
  font-size: .62rem; letter-spacing: 4px; color: var(--ink4);
  margin-top: 8px; text-transform: uppercase;
}
.wordmark-line {
  width: 40px; height: 1.5px; background: var(--ink); margin: 12px auto 0; opacity: 0.2;
}

/* APP GRID */
.app-grid {
  display: grid;
  grid-template-columns: repeat(4, 148px);
  gap: 12px;
  animation: gridIn .6s cubic-bezier(.23,1,.32,1) .2s backwards;
}
@keyframes gridIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 680px) { .app-grid { grid-template-columns: repeat(2, 148px); } }
@media (max-width: 360px) { .app-grid { grid-template-columns: repeat(2, 130px); gap: 10px; } }

.app-card {
  position: relative;
  padding: 24px 14px 18px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .25s cubic-bezier(.23,1,.32,1), box-shadow .25s, background .2s;
  animation: cardPop .5s cubic-bezier(.23,1,.32,1) backwards;
  overflow: hidden;
}
@keyframes cardPop { from { opacity: 0; transform: translateY(12px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.app-card:hover {
  transform: translate(-2px,-3px);
  box-shadow: 4px 5px 0 var(--ink3);
  background: var(--paper2);
}
.app-card:active {
  transform: translate(1px,1px);
  box-shadow: 1px 1px 0 var(--ink4);
}
.app-card-tag {
  position: absolute; top: 10px; right: 10px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ink); opacity: 0.15;
}
.app-card:hover .app-card-tag { opacity: 0.6; }
.app-icon {
  width: 40px; height: 40px; color: var(--ink);
  transition: transform .25s cubic-bezier(.23,1,.32,1);
}
.app-icon svg { width: 100%; height: 100%; stroke-width: 1.5; }
.app-card:hover .app-icon { transform: scale(1.1) translateY(-2px); }
.app-label {
  font-size: .78rem; font-weight: 600; letter-spacing: .5px; color: var(--ink2);
  transition: color .2s;
}
.app-card:hover .app-label { color: var(--ink); }

/* RIPPLE */
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(0,0,0,0.06);
  transform: scale(0);
  animation: rippleAnim .5s ease-out forwards;
  pointer-events: none; z-index: 5;
}
[data-theme="dark"] .ripple { background: rgba(255,255,255,0.06); }
@keyframes rippleAnim { to { transform: scale(5); opacity: 0; } }

/* DOCK */
.dock-wrap {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%); z-index: 200;
  animation: dockUp .6s cubic-bezier(.23,1,.32,1) .35s backwards;
}
@keyframes dockUp { from { transform: translate(-50%, 50px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
.dock {
  display: flex; align-items: flex-end; gap: 6px;
  padding: 8px 12px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 4px 0 var(--ink3), 0 6px 24px rgba(0,0,0,0.15);
}
.di {
  position: relative;
  width: 42px; height: 42px;
  border-radius: 10px;
  background: var(--paper2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink3); cursor: pointer;
  transform-origin: bottom center;
  transition: background .18s, color .18s, border-color .18s;
  flex-shrink: 0;
}
.di svg { width: 20px; height: 20px; stroke-width: 1.5; }
.di:hover { background: var(--paper3); color: var(--ink); border-color: var(--ink4); }
.di-tip {
  position: absolute; bottom: calc(100% + 10px);
  left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--ink); color: var(--paper);
  padding: 4px 10px; border-radius: 6px;
  font-size: .65rem; font-weight: 600; letter-spacing: .5px; white-space: nowrap;
  pointer-events: none; opacity: 0;
  transition: opacity .15s, transform .15s cubic-bezier(.23,1,.32,1);
}
.di-tip::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent; border-top-color: var(--ink);
}
.di:hover .di-tip { opacity: 1; transform: translateX(-50%) translateY(0); }
.dock-sep { width: 1px; height: 22px; background: var(--border); align-self: center; flex-shrink: 0; }

/* LOADER */
#loader {
  position: fixed; inset: 0;
  background: var(--paper);
  z-index: 9998;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  pointer-events: none; opacity: 0;
  transition: opacity .25s ease;
}
#loader.show { opacity: 1; pointer-events: auto; }
.loader-icon { width: 56px; height: 56px; color: var(--ink); animation: loaderFloat 2s ease-in-out infinite; }
.loader-icon svg { width: 100%; height: 100%; stroke-width: 1.4; }
@keyframes loaderFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.loader-name {
  font-family: 'Space Mono', monospace;
  font-size: .75rem; letter-spacing: 3px; text-transform: uppercase; color: var(--ink3);
}
.loader-bar-bg { width: 180px; height: 2px; background: var(--paper3); border-radius: 2px; overflow: hidden; }
.loader-bar-fill { height: 100%; width: 0%; background: var(--ink); border-radius: 2px; transition: width .75s cubic-bezier(.65,0,.35,1); }

/* STAGGER */
.stagger-1 { animation-delay: .04s !important; }
.stagger-2 { animation-delay: .08s !important; }
.stagger-3 { animation-delay: .12s !important; }
.stagger-4 { animation-delay: .16s !important; }
.stagger-5 { animation-delay: .20s !important; }
.stagger-6 { animation-delay: .24s !important; }
.stagger-7 { animation-delay: .28s !important; }
.stagger-8 { animation-delay: .32s !important; }
</style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>

<header id="topbar">
  <div class="topbar-logo">
    <div class="logo-mark"><div class="logo-mark-inner"></div></div>
    Tantrix
  </div>
  <div class="topbar-status" id="statusText">Ready</div>
  <div class="topbar-right">
    <div id="clock">--:--:--</div>
    <button id="themeBtn" class="hover-target" title="Toggle theme">☀</button>
  </div>
</header>

<a href="https://github.com/Atromost" target="_blank" class="git-btn hover-target">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
    <path d="M9 18c-4.51 2-5-2-7-2"/>
  </svg>
  GitHub
</a>

<main id="stage">
  <div class="wordmark">
    <h1>Tan<span>trix</span></h1>
    <div class="wordmark-line"></div>
    <p>8 apps · Premium Suite</p>
  </div>
  <div class="app-grid" id="appGrid"></div>
</main>

<div class="dock-wrap">
  <nav class="dock" id="dock"></nav>
</div>

<div id="loader">
  <div class="loader-icon" id="loaderIcon"></div>
  <div class="loader-name" id="loaderName">Launching…</div>
  <div class="loader-bar-bg"><div class="loader-bar-fill" id="loaderBar"></div></div>
</div>

<script>
const APPS = [
  { id:'drawkiboard', name:'Drawki',  url:'Drawkiboard.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 20h9"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>` },
  { id:'flowlynotes', name:'Flowly',  url:'Flowlynotes.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path stroke-linecap="round" stroke-linejoin="round" d="M14 2v6h6"/><line stroke-linecap="round" stroke-linejoin="round" x1="16" x2="8" y1="13" y2="13"/><line stroke-linecap="round" stroke-linejoin="round" x1="16" x2="8" y1="17" y2="17"/><line stroke-linecap="round" stroke-linejoin="round" x1="10" x2="8" y1="9" y2="9"/></svg>` },
  { id:'anzen',       name:'Anzen',   url:'anzen.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path stroke-linecap="round" stroke-linejoin="round" d="m9 12 2 2 4-4"/></svg>` },
  { id:'easycv',      name:'EasyCV',  url:'easycv.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect stroke-linecap="round" stroke-linejoin="round" width="20" height="14" x="2" y="7" rx="2" ry="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>` },
  { id:'gigapdf',     name:'GigaPDF', url:'gigapdf.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path stroke-linecap="round" stroke-linejoin="round" d="M14 2v6h6"/><line stroke-linecap="round" stroke-linejoin="round" x1="12" x2="12" y1="18" y2="12"/><polyline stroke-linecap="round" stroke-linejoin="round" points="9 15 12 18 15 15"/></svg>` },
  { id:'nexus',       name:'Nexus',   url:'nexus.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle stroke-linecap="round" stroke-linejoin="round" cx="18" cy="5" r="3"/><circle stroke-linecap="round" stroke-linejoin="round" cx="6" cy="12" r="3"/><circle stroke-linecap="round" stroke-linejoin="round" cx="18" cy="19" r="3"/><line stroke-linecap="round" stroke-linejoin="round" x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line stroke-linecap="round" stroke-linejoin="round" x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>` },
  { id:'stopwatch',   name:'Tempo',   url:'stopwatch.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle stroke-linecap="round" stroke-linejoin="round" cx="12" cy="13" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4l2 2"/><path stroke-linecap="round" stroke-linejoin="round" d="M5 3 2 6"/><path stroke-linecap="round" stroke-linejoin="round" d="m22 6-3-3"/></svg>` },
  { id:'wikiuse',     name:'Wikiuse', url:'wikiuse.html',
    icon:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path stroke-linecap="round" stroke-linejoin="round" d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>` }
];

const grid = document.getElementById('appGrid');
const dock = document.getElementById('dock');

APPS.forEach((app, i) => {
  const card = document.createElement('div');
  card.className = `app-card hover-target stagger-${i+1}`;
  card.innerHTML = `<div class="app-card-tag"></div><div class="app-icon">${app.icon}</div><span class="app-label">${app.name}</span>`;
  card.addEventListener('click', e => { ripple(card, e); launch(app); });
  grid.appendChild(card);

  if (i === 5) { const sep = document.createElement('div'); sep.className = 'dock-sep'; dock.appendChild(sep); }
  const di = document.createElement('div');
  di.className = 'di hover-target';
  di.innerHTML = `${app.icon}<div class="di-tip">${app.name}</div>`;
  di.addEventListener('click', () => launch(app));
  dock.appendChild(di);
});

/* DOCK MAGNIFICATION */
const dockEl = document.getElementById('dock');
const diItems = dockEl.querySelectorAll('.di');
dockEl.addEventListener('mousemove', e => {
  diItems.forEach(item => {
    const r = item.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const dist = Math.abs(e.clientX - cx);
    const INFLUENCE = 110;
    let s = dist < INFLUENCE ? 1 + 0.4 * (0.5 + 0.5 * Math.cos((dist / INFLUENCE) * Math.PI)) : 1;
    item.style.transform = `scale(${s}) translateY(${-(s-1)*12}px)`;
  });
});
dockEl.addEventListener('mouseleave', () => { diItems.forEach(item => { item.style.transform = ''; }); });

/* LAUNCHER */
const loader = document.getElementById('loader');
const loaderIcon = document.getElementById('loaderIcon');
const loaderName = document.getElementById('loaderName');
const loaderBar = document.getElementById('loaderBar');
const statusTxt = document.getElementById('statusText');

function launch(app) {
  loaderIcon.innerHTML = app.icon;
  loaderName.textContent = `Starting ${app.name}…`;
  loaderBar.style.width = '0%';
  loader.classList.add('show');
  statusTxt.textContent = `Loading ${app.name}`;
  setTimeout(() => { loaderBar.style.width = '100%'; }, 60);
  setTimeout(() => { window.location.href = app.url; }, 950);
}

/* RIPPLE */
function ripple(el, e) {
  const r = el.getBoundingClientRect();
  const rip = document.createElement('div');
  rip.className = 'ripple';
  rip.style.cssText = `left:${e.clientX - r.left}px;top:${e.clientY - r.top}px;width:${r.width}px;height:${r.width}px;margin-left:-${r.width/2}px;margin-top:-${r.width/2}px;`;
  el.appendChild(rip);
  rip.addEventListener('animationend', () => rip.remove());
}

/* CLOCK */
const clockEl = document.getElementById('clock');
function updateClock() {
  const now = new Date();
  clockEl.textContent = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
}
updateClock(); setInterval(updateClock, 1000);

/* THEME TOGGLE */
const themeBtn = document.getElementById('themeBtn');
let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeBtn.textContent = dark ? '☀' : '☾';
}
applyTheme();
themeBtn.addEventListener('click', () => { dark = !dark; applyTheme(); });

/* CURSOR */
(function() {
  const dot = document.getElementById('cur-dot');
  const ring = document.getElementById('cur-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;
  window.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.transform = `translate(calc(${mx}px - 50%), calc(${my}px - 50%))`;
  });
  document.querySelectorAll('.hover-target').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });
  window.addEventListener('mousedown', () => document.body.classList.add('clicking'));
  window.addEventListener('mouseup', () => document.body.classList.remove('clicking'));
  (function frame() {
    rx += (mx - rx) * .13; ry += (my - ry) * .13;
    ring.style.transform = `translate(calc(${rx}px - 50%), calc(${ry}px - 50%))`;
    requestAnimationFrame(frame);
  })();
  document.addEventListener('mouseleave', () => { dot.style.opacity='0'; ring.style.opacity='0'; });
  document.addEventListener('mouseenter', () => { dot.style.opacity='1'; ring.style.opacity='1'; });
})();
</script>
</body>
</html>
