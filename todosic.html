<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Todosic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #fc3c44;
    --accent2: #ff6b6b;
    --accent-glow: rgba(252,60,68,0.18);
    --font-display: 'Bebas Neue', 'Arial Narrow', sans-serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --bg: #0a0a0a; --bg2: #141414; --bg3: #1c1c1e; --bg4: #242426; --bg5: #2c2c2e;
    --text: #f5f5f7; --text2: #a1a1a6; --text3: #636366;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --card-shadow: 0 8px 32px rgba(0,0,0,0.6); --input-bg: rgba(255,255,255,0.06); --done-opacity: 0.38;
  }
  [data-theme="light"] {
    --bg: #f2f2f7; --bg2: #ffffff; --bg3: #ffffff; --bg4: #f2f2f7; --bg5: #e5e5ea;
    --text: #1c1c1e; --text2: #636366; --text3: #aeaeb2;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.13);
    --card-shadow: 0 4px 20px rgba(0,0,0,0.10); --input-bg: rgba(0,0,0,0.04); --done-opacity: 0.45;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

  .app { max-width: 520px; margin: 0 auto; padding: 0 0 140px; position: relative; }

  /* HEADER */
  .header { padding: 54px 24px 0; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .logo-wrap { display: flex; flex-direction: column; }
  .logo-title { font-family: var(--font-display); font-size: 52px; line-height: 0.92; letter-spacing: 2px; color: var(--text); display: flex; align-items: center; }
  .logo-dot { display: inline-block; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; margin-left: 3px; margin-bottom: 6px; flex-shrink: 0; }
  .logo-sub { font-size: 11px; font-weight: 500; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
  .icon-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background var(--transition), transform var(--transition); color: var(--text2); }
  .icon-btn:hover { background: var(--bg4); transform: scale(1.06); color: var(--text); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* STATS */
  .stats-bar { display: flex; gap: 12px; padding: 20px 24px 0; }
  .stat-card { flex: 1; background: var(--bg2); border-radius: var(--radius-md); padding: 14px 16px; border: 1px solid var(--border); }
  .stat-card.accent-card { background: var(--accent); border-color: transparent; }
  .stat-num { font-family: var(--font-display); font-size: 34px; line-height: 1; color: var(--text); letter-spacing: 1px; }
  .accent-card .stat-num { color: #fff; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
  .accent-card .stat-label { color: rgba(255,255,255,0.75); }

  /* FILTER TABS */
  .filter-tabs { display: flex; gap: 6px; padding: 20px 24px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 8px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); transition: all var(--transition); user-select: none; }
  .tab.active { background: var(--accent); border-color: transparent; color: #fff; }
  .tab:not(.active):hover { background: var(--bg4); color: var(--text); }

  /* SHORTCUTS HINT */
  .shortcuts-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 24px 0; }
  .key-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-weight: 500; }
  .key { background: var(--bg4); border: 1px solid var(--border2); border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 11px; color: var(--text2); }

  /* SECTION */
  .section-header { padding: 24px 24px 10px; display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .clear-btn { font-size: 13px; font-weight: 500; color: var(--accent); cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background var(--transition); }
  .clear-btn:hover { background: var(--accent-glow); }

  /* TODO LIST */
  .todo-list { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
  .todo-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--bg2); border-radius: var(--radius-md); border: 1px solid var(--border); transition: all var(--transition); cursor: default; position: relative; overflow: hidden; animation: slideIn 0.28s cubic-bezier(0.4,0,0.2,1); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .todo-item:hover { border-color: var(--border2); background: var(--bg3); }
  .todo-item.done { opacity: var(--done-opacity); }
  .todo-item.done .todo-text { text-decoration: line-through; }
  .todo-item::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; border-radius: 0 2px 2px 0; background: transparent; }
  .todo-item.prio-high::before { background: var(--accent); }
  .todo-item.prio-medium::before { background: #ff9f0a; }
  .todo-item.prio-low::before { background: #30d158; }

  .check-wrap { width: 24px; height: 24px; flex-shrink: 0; cursor: pointer; }
  .check-wrap svg { width: 24px; height: 24px; display: block; }
  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.35; word-break: break-word; }
  .todo-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .todo-cat { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; background: var(--bg4); color: var(--text3); }
  .todo-date { font-size: 11px; color: var(--text3); }
  .todo-date.overdue { color: var(--accent); }
  .todo-ai-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 6px; background: rgba(252,60,68,0.15); color: var(--accent); border: 1px solid rgba(252,60,68,0.25); }

  .todo-actions { display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition); }
  .todo-item:hover .todo-actions { opacity: 1; }
  .todo-item-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: background var(--transition); color: var(--text3); }
  .todo-item-btn:hover { background: var(--bg5); color: var(--text); }
  .todo-item-btn.del:hover { background: rgba(252,60,68,0.12); color: var(--accent); }
  .todo-item-btn svg { width: 15px; height: 15px; }

  /* EMPTY */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; gap: 12px; color: var(--text3); }
  .empty svg { width: 56px; height: 56px; opacity: 0.35; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text2); }
  .empty-sub { font-size: 14px; text-align: center; line-height: 1.5; }

  /* ADD AREA */
  .add-area { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 0 12px 24px; pointer-events: none; }
  .add-card { max-width: 520px; margin: 0 auto; width: 100%; background: var(--bg3); border-radius: var(--radius-xl); border: 1px solid var(--border2); box-shadow: var(--card-shadow); overflow: hidden; pointer-events: all; }
  .add-bar { display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
  .add-input { flex: 1; background: transparent; border: none; outline: none; font-family: var(--font-body); font-size: 15px; font-weight: 400; color: var(--text); min-width: 0; }
  .add-input::placeholder { color: var(--text3); }

  .add-options { max-height: 0; overflow: hidden; transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1); border-top: 1px solid transparent; }
  .add-options.open { max-height: 220px; border-top-color: var(--border); }
  .add-options-inner { padding: 12px 16px 16px; display: flex; flex-wrap: wrap; gap: 10px; }
  .opt-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
  .opt-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
  .opt-pills { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill { padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: var(--bg4); color: var(--text2); transition: all 0.15s; user-select: none; }
  .pill.sel { color: #fff; border-color: transparent; }
  .pill-red.sel { background: var(--accent); }
  .pill-orange.sel { background: #ff9f0a; }
  .pill-green.sel { background: #30d158; }
  .pill-cat.sel { background: var(--text3); }
  .date-input { padding: 5px 10px; border-radius: 100px; font-size: 12px; font-weight: 500; border: 1px solid var(--border2); background: var(--bg4); color: var(--text2); font-family: var(--font-body); cursor: pointer; outline: none; min-width: 130px; }
  .date-input:focus { border-color: var(--accent); }

  .add-submit { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform var(--transition), opacity var(--transition); flex-shrink: 0; color: #fff; }
  .add-submit:hover { transform: scale(1.08); }
  .add-submit:active { transform: scale(0.94); }
  .add-submit:disabled { opacity: 0.35; cursor: default; transform: none; }
  .add-submit svg { width: 17px; height: 17px; }

  .expand-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--bg4); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all var(--transition); color: var(--text2); flex-shrink: 0; }
  .expand-btn:hover { background: var(--bg5); color: var(--text); }
  .expand-btn svg { width: 15px; height: 15px; transition: transform var(--transition); }
  .expand-btn.open svg { transform: rotate(180deg); }

  /* GODMODE BANNER */
  .godmode-banner { display: none; align-items: center; gap: 10px; padding: 8px 16px; background: linear-gradient(135deg, rgba(252,60,68,0.2), rgba(255,107,107,0.1)); border-top: 1px solid rgba(252,60,68,0.3); }
  .godmode-banner.visible { display: flex; }
  .godmode-icon { font-size: 18px; }
  .godmode-text { flex: 1; font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; }
  .godmode-loader { width: 16px; height: 16px; border: 2px solid rgba(252,60,68,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .godmode-loader.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { width: 100%; max-width: 520px; background: var(--bg3); border-radius: var(--radius-xl) var(--radius-xl) 0 0; border: 1px solid var(--border2); border-bottom: none; padding: 24px 24px 48px; transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 -8px 48px rgba(0,0,0,0.4); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
  .modal-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-family: var(--font-body); font-size: 15px; font-weight: 400; color: var(--text); outline: none; resize: none; transition: border-color var(--transition); margin-bottom: 16px; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  .btn { padding: 10px 22px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition); border: none; }
  .btn-ghost { background: var(--bg4); color: var(--text2); }
  .btn-ghost:hover { background: var(--bg5); color: var(--text); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }

  /* PROGRESS RING */
  .progress-ring { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border2); stroke-width: 3; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1); }
  .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text2); }

  /* TOAST */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-md); padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--text); box-shadow: var(--card-shadow); z-index: 500; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.accent { border-color: rgba(252,60,68,0.4); color: var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 400px) { .logo-title { font-size: 44px; } .stat-num { font-size: 28px; } }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo-title">TODOSIC<span class="logo-dot"></span></div>
        <div class="logo-sub">Your Daily Rhythm</div>
      </div>
      <div class="header-actions">
        <div class="progress-ring" title="Completion rate">
          <svg class="ring-svg" width="44" height="44" viewBox="0 0 44 44">
            <circle class="ring-track" cx="22" cy="22" r="18"/>
            <circle class="ring-fill" id="ringFill" cx="22" cy="22" r="18" stroke-dasharray="113" stroke-dashoffset="113"/>
          </svg>
          <div class="ring-pct" id="ringPct">0%</div>
        </div>
        <div class="icon-btn" id="themeBtn" title="Toggle theme (T)">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card accent-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statDone">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statLeft">0</div>
      <div class="stat-label">Left</div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs" id="filterTabs">
    <div class="tab active" data-filter="all">All</div>
    <div class="tab" data-filter="active">Active</div>
    <div class="tab" data-filter="done">Done</div>
    <div class="tab" data-filter="high">🔴 High</div>
    <div class="tab" data-filter="medium">🟠 Medium</div>
    <div class="tab" data-filter="low">🟢 Low</div>
  </div>

  <!-- SHORTCUTS HINT -->
  <div class="shortcuts-bar">
    <span class="key-badge"><span class="key">N</span> New task</span>
    <span class="key-badge"><span class="key">T</span> Theme</span>
    <span class="key-badge"><span class="key">1–6</span> Filter</span>
    <span class="key-badge"><span class="key">Esc</span> Close</span>
  </div>

  <!-- MAIN LIST -->
  <div id="mainList"></div>
</div>

<!-- ADD AREA -->
<div class="add-area">
  <div class="add-card">
    <!-- GODMODE BANNER -->
    <div class="godmode-banner" id="godmodeBanner">
      <span class="godmode-icon">⚡</span>
      <span class="godmode-text">GOD MODE — AI will generate tasks for you</span>
      <div class="godmode-loader" id="godmodeLoader"></div>
    </div>
    <div class="add-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3);flex-shrink:0">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <input class="add-input" id="addInput" placeholder='Add a task.' autocomplete="off" spellcheck="false">
      <button class="expand-btn" id="expandBtn" title="More options">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <button class="add-submit" id="addBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="add-options" id="addOptions">
      <div class="add-options-inner">
        <div class="opt-group">
          <div class="opt-label">Priority</div>
          <div class="opt-pills" id="prioPills">
            <div class="pill pill-red" data-prio="high">High</div>
            <div class="pill pill-orange sel" data-prio="medium">Med</div>
            <div class="pill pill-green" data-prio="low">Low</div>
          </div>
        </div>
        <div class="opt-group">
          <div class="opt-label">Category</div>
          <div class="opt-pills" id="catPills">
            <div class="pill pill-cat" data-cat="Work">Work</div>
            <div class="pill pill-cat" data-cat="Personal">Personal</div>
            <div class="pill pill-cat" data-cat="Health">Health</div>
            <div class="pill pill-cat" data-cat="Study">Study</div>
          </div>
        </div>
        <div class="opt-group">
          <div class="opt-label">Due Date</div>
          <input type="date" class="date-input" id="addDate">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Task</div>
    <textarea class="modal-input" id="editInput" rows="3" placeholder="Task name…"></textarea>
    <div class="modal-row" id="editPrioPills">
      <div class="pill pill-red" data-prio="high">High</div>
      <div class="pill pill-orange" data-prio="medium">Medium</div>
      <div class="pill pill-green" data-prio="low">Low</div>
    </div>
    <div class="modal-row" id="editCatPills">
      <div class="pill pill-cat" data-cat="Work">Work</div>
      <div class="pill pill-cat" data-cat="Personal">Personal</div>
      <div class="pill pill-cat" data-cat="Health">Health</div>
      <div class="pill pill-cat" data-cat="Study">Study</div>
    </div>
    <div class="modal-row">
      <input type="date" class="date-input" id="editDate" style="min-width:140px">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-accent" id="modalSave">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const STORAGE_KEY = 'todosic_v3';
let todos = [];
let filter = 'all';
let editId = null;
let addPrio = 'medium';
let addCat = '';
let addOptionsOpen = false;
let godmodeActive = false;

function load() {
  try { todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { todos = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ── TOAST ──
let toastTimer;
function showToast(msg, accent = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (accent ? ' accent' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2800);
}

// ── SVGs ──
const svgCheck = (done) => done
  ? `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="var(--accent)"/><polyline points="6 12 10 16 18 8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
  : `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="var(--border2)" stroke-width="1.5"/></svg>`;
const svgEdit = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const svgDel = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
const svgEmpty = `<svg viewBox="0 0 64 64" fill="none"><rect x="10" y="12" width="44" height="40" rx="6" stroke="currentColor" stroke-width="2"/><line x1="20" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="20" y1="32" x2="38" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="20" y1="40" x2="30" y2="40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;

// ── RENDER ──
function filteredTodos() {
  switch(filter) {
    case 'active': return todos.filter(t => !t.done);
    case 'done':   return todos.filter(t => t.done);
    case 'high':   return todos.filter(t => t.prio === 'high');
    case 'medium': return todos.filter(t => t.prio === 'medium');
    case 'low':    return todos.filter(t => t.prio === 'low');
    default:       return [...todos];
  }
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return { txt: 'Overdue', over: true };
  if (diff === 0) return { txt: 'Today', over: false };
  if (diff === 1) return { txt: 'Tomorrow', over: false };
  return { txt: d.toLocaleDateString('en', { month: 'short', day: 'numeric' }), over: false };
}

function render() {
  const list = filteredTodos();
  const container = document.getElementById('mainList');
  const active = list.filter(t => !t.done);
  const done = list.filter(t => t.done);
  let html = '';

  if (active.length === 0 && done.length === 0) {
    html = `<div class="empty">${svgEmpty}<div class="empty-title">Nothing here yet</div><div class="empty-sub">Add a task below, or type /godmode for AI magic ✨</div></div>`;
  } else {
    if (active.length > 0) {
      html += `<div class="section-header"><div class="section-title">Tasks</div></div><div class="todo-list">`;
      active.forEach(t => { html += todoHTML(t); });
      html += `</div>`;
    }
    if (done.length > 0) {
      html += `<div class="section-header"><div class="section-title" style="color:var(--text2)">Completed</div><div class="clear-btn" id="clearDoneBtn">Clear all</div></div><div class="todo-list">`;
      done.forEach(t => { html += todoHTML(t); });
      html += `</div>`;
    }
  }

  container.innerHTML = html;
  updateStats();
  updateRing();

  container.querySelectorAll('.check-wrap').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); toggleDone(el.dataset.id); });
  });
  container.querySelectorAll('.edit-btn').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openEdit(el.dataset.id); });
  });
  container.querySelectorAll('.del-btn').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); deleteTodo(el.dataset.id); });
  });
  const clearBtn = document.getElementById('clearDoneBtn');
  if (clearBtn) clearBtn.addEventListener('click', clearDone);
}

function todoHTML(t) {
  const dateInfo = formatDate(t.date);
  return `
    <div class="todo-item ${t.done ? 'done' : ''} prio-${t.prio || 'none'}" data-id="${t.id}">
      <div class="check-wrap" data-id="${t.id}">${svgCheck(t.done)}</div>
      <div class="todo-body">
        <div class="todo-text">${escHTML(t.text)}</div>
        <div class="todo-meta">
          ${t.cat ? `<span class="todo-cat">${escHTML(t.cat)}</span>` : ''}
          ${t.aiGenerated ? `<span class="todo-ai-badge">AI</span>` : ''}
          ${dateInfo ? `<span class="todo-date ${dateInfo.over ? 'overdue' : ''}">${dateInfo.txt}</span>` : ''}
        </div>
      </div>
      <div class="todo-actions">
        <div class="todo-item-btn edit-btn" data-id="${t.id}" title="Edit (E)">${svgEdit}</div>
        <div class="todo-item-btn del-btn" data-id="${t.id}" title="Delete">${svgDel}</div>
      </div>
    </div>`;
}

function escHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  const total = todos.length;
  const done = todos.filter(t => t.done).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statLeft').textContent = total - done;
}

function updateRing() {
  const total = todos.length;
  const done = todos.filter(t => t.done).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  const circ = 2 * Math.PI * 18;
  document.getElementById('ringFill').style.strokeDashoffset = circ - (pct / 100) * circ;
  document.getElementById('ringPct').textContent = pct + '%';
}

// ── ACTIONS ──
function toggleDone(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}
function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  save(); render();
}
function clearDone() {
  todos = todos.filter(t => !t.done);
  save(); render();
  showToast('Cleared completed tasks');
}

// ── ADD LOGIC ──
const addInput = document.getElementById('addInput');
const addBtn = document.getElementById('addBtn');
const expandBtn = document.getElementById('expandBtn');
const addOptions = document.getElementById('addOptions');
const godmodeBanner = document.getElementById('godmodeBanner');
const godmodeLoader = document.getElementById('godmodeLoader');

// Watch for /godmode trigger
addInput.addEventListener('input', () => {
  const val = addInput.value;
  if (val === '/godmode' || val.startsWith('/godmode ')) {
    if (!godmodeActive) {
      godmodeActive = true;
      godmodeBanner.classList.add('visible');
      addInput.placeholder = 'Describe your goal or day… (e.g. "prepare for exam")';
      showToast('⚡ God Mode activated! Describe your goal', true);
    }
  } else {
    if (godmodeActive && !val.startsWith('/godmode')) {
      // keep godmode if they just cleared /godmode but typed something else
    }
  }
});

expandBtn.addEventListener('click', () => {
  addOptionsOpen = !addOptionsOpen;
  addOptions.classList.toggle('open', addOptionsOpen);
  expandBtn.classList.toggle('open', addOptionsOpen);
});

// Priority pills (default medium already selected in HTML)
document.getElementById('prioPills').querySelectorAll('.pill').forEach(el => {
  el.addEventListener('click', () => {
    addPrio = el.dataset.prio;
    document.getElementById('prioPills').querySelectorAll('.pill').forEach(p => p.classList.remove('sel'));
    el.classList.add('sel');
  });
});

document.getElementById('catPills').querySelectorAll('.pill').forEach(el => {
  el.addEventListener('click', () => {
    if (el.classList.contains('sel')) { el.classList.remove('sel'); addCat = ''; return; }
    document.getElementById('catPills').querySelectorAll('.pill').forEach(p => p.classList.remove('sel'));
    el.classList.add('sel');
    addCat = el.dataset.cat;
  });
});

addInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAdd(); }
});
addBtn.addEventListener('click', handleAdd);

function handleAdd() {
  const val = addInput.value.trim();
  if (!val) return;

  if (godmodeActive) {
    const prompt = val.startsWith('/godmode') ? val.replace('/godmode', '').trim() : val;
    if (!prompt) { showToast('Type your goal after /godmode'); return; }
    runGodMode(prompt);
    return;
  }

  // Normal add
  todos.unshift({
    id: uid(), text: val, done: false,
    prio: addPrio, cat: addCat,
    date: document.getElementById('addDate').value || '',
    created: Date.now()
  });
  save(); render();
  addInput.value = '';
  addInput.focus();
  showToast('Task added ✓');
}

// ── GOD MODE ──
async function runGodMode(prompt) {
  godmodeLoader.classList.add('active');
  addBtn.disabled = true;
  addInput.disabled = true;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Generate a practical, actionable todo list for this goal or situation: "${prompt}".
Return ONLY a JSON array, no markdown, no explanation. Each item: {"text": "task name", "prio": "high"|"medium"|"low", "cat": "Work"|"Personal"|"Health"|"Study"|""}.
Generate 4-7 tasks. Make them specific and actionable.`
        }]
      })
    });

    const data = await response.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    
    // Parse JSON safely
    const clean = raw.replace(/```json|```/g, '').trim();
    const tasks = JSON.parse(clean);

    if (!Array.isArray(tasks) || tasks.length === 0) throw new Error('Bad response');

    tasks.forEach(task => {
      todos.unshift({
        id: uid(),
        text: task.text || 'Untitled task',
        done: false,
        prio: task.prio || 'medium',
        cat: task.cat || '',
        date: '',
        created: Date.now(),
        aiGenerated: true
      });
    });

    save(); render();
    showToast(`⚡ ${tasks.length} AI tasks added!`, true);

    // Reset
    addInput.value = '';
    addInput.placeholder = 'Add a task… or type /godmode';
    godmodeActive = false;
    godmodeBanner.classList.remove('visible');

  } catch (err) {
    console.error('God Mode error:', err);
    showToast('God Mode failed — check console');
  } finally {
    godmodeLoader.classList.remove('active');
    addBtn.disabled = false;
    addInput.disabled = false;
    addInput.focus();
  }
}

// ── EDIT MODAL ──
function openEdit(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('editInput').value = t.text;
  document.getElementById('editDate').value = t.date || '';
  document.getElementById('editPrioPills').querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('sel', p.dataset.prio === t.prio);
  });
  document.getElementById('editCatPills').querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('sel', p.dataset.cat === t.cat);
  });
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('editInput').focus(), 350);
}

document.getElementById('editPrioPills').querySelectorAll('.pill').forEach(el => {
  el.addEventListener('click', () => {
    document.getElementById('editPrioPills').querySelectorAll('.pill').forEach(p => p.classList.remove('sel'));
    el.classList.add('sel');
  });
});
document.getElementById('editCatPills').querySelectorAll('.pill').forEach(el => {
  el.addEventListener('click', () => {
    if (el.classList.contains('sel')) { el.classList.remove('sel'); return; }
    document.getElementById('editCatPills').querySelectorAll('.pill').forEach(p => p.classList.remove('sel'));
    el.classList.add('sel');
  });
});

document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('modalSave').addEventListener('click', () => {
  const t = todos.find(t => t.id === editId);
  if (!t) return;
  const text = document.getElementById('editInput').value.trim();
  if (!text) return;
  t.text = text;
  t.date = document.getElementById('editDate').value || '';
  const selPrio = document.getElementById('editPrioPills').querySelector('.pill.sel');
  if (selPrio) t.prio = selPrio.dataset.prio;
  const selCat = document.getElementById('editCatPills').querySelector('.pill.sel');
  t.cat = selCat ? selCat.dataset.cat : '';
  save(); render(); closeModal();
  showToast('Task updated ✓');
});

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editId = null;
}

// ── FILTER TABS ──
document.getElementById('filterTabs').querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    filter = tab.dataset.filter;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render();
  });
});

// ── THEME ──
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('todosic_theme', t);
  const icon = document.getElementById('themeIcon');
  if (t === 'dark') {
    icon.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  } else {
    icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
  }
}
document.getElementById('themeBtn').addEventListener('click', () => {
  const cur = document.documentElement.dataset.theme;
  setTheme(cur === 'dark' ? 'light' : 'dark');
  showToast(cur === 'dark' ? '☀️ Light mode' : '🌙 Dark mode');
});

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  const inField = ['INPUT','TEXTAREA'].includes(tag);
  const modalOpen = document.getElementById('modalOverlay').classList.contains('open');

  // Escape
  if (e.key === 'Escape') {
    if (modalOpen) { closeModal(); return; }
    if (godmodeActive) {
      godmodeActive = false;
      godmodeBanner.classList.remove('visible');
      addInput.value = '';
      addInput.placeholder = 'Add a task… or type /godmode';
      showToast('God Mode deactivated');
      return;
    }
    addInput.blur();
    return;
  }

  // Don't fire shortcuts when typing in a field (except Escape above)
  if (inField) return;

  // N — focus add input
  if (e.key === 'n' || e.key === 'N') {
    e.preventDefault();
    addInput.focus();
    showToast('Type your task');
    return;
  }

  // T — toggle theme
  if (e.key === 't' || e.key === 'T') {
    const cur = document.documentElement.dataset.theme;
    setTheme(cur === 'dark' ? 'light' : 'dark');
    showToast(cur === 'dark' ? '☀️ Light mode' : '🌙 Dark mode');
    return;
  }

  // G — god mode
  if (e.key === 'g' || e.key === 'G') {
    e.preventDefault();
    addInput.value = '/godmode ';
    addInput.focus();
    godmodeActive = true;
    godmodeBanner.classList.add('visible');
    addInput.placeholder = 'Describe your goal or day…';
    showToast('⚡ God Mode — type your goal', true);
    return;
  }

  // 1–6 — filter tabs
  const filters = ['all','active','done','high','medium','low'];
  const idx = parseInt(e.key) - 1;
  if (idx >= 0 && idx < filters.length) {
    filter = filters[idx];
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    render();
    showToast(`Filter: ${filters[idx].charAt(0).toUpperCase() + filters[idx].slice(1)}`);
    return;
  }

  // D — clear done
  if (e.key === 'd' || e.key === 'D') {
    clearDone();
    return;
  }
});

// ── INIT ──
(function init() {
  const savedTheme = localStorage.getItem('todosic_theme') || 'dark';
  setTheme(savedTheme);
  load();
  if (todos.length === 0) {
    todos = [
      { id: uid(), text: 'Welcome to Todosic! Click to complete ✓', done: false, prio: 'high', cat: 'Personal', date: '', created: Date.now() },
      { id: uid(), text: 'Add a task using the bar below', done: false, prio: 'medium', cat: 'Work', date: '', created: Date.now() },
    ];
    save();
  }
  render();
  if (window.innerWidth > 600) addInput.focus();
})();
</script>
</body>
</html>
